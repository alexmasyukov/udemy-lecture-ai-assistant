<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Udemy Lecture AI</title>
    <link rel="stylesheet" href="sidepanel.css" />
    <link rel="stylesheet" href="vendor/highlight-github-dark.min.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="status">
        <span class="dot" id="status-dot"></span>
        <span class="status-label" id="status-label">LLM offline</span>
      </div>
      <div class="actions">
        <button id="summarize" class="icon-btn text-btn" title="Summarize this lecture">Summarize it</button>
        <button id="load-transcript" class="icon-btn text-btn" title="Reload lecture transcript">Reload lecture transcript</button>
        <div class="menu-wrap">
          <button id="menu-toggle" class="icon-btn" title="More" aria-haspopup="true" aria-expanded="false">▾</button>
          <div id="menu" class="menu hidden">
            <a id="summarize-examples" href="#" class="menu-item">Summary with examples</a>
            <a id="clear-chat" href="#" class="menu-item">Clear chat history</a>
          </div>
        </div>
        <button id="settings-toggle" class="icon-btn" title="Settings">⛭</button>
      </div>
    </header>

    <section id="settings-panel" class="settings hidden">
      <div class="tabs" role="tablist">
        <button class="tab active" type="button" data-tab="model" role="tab">Model</button>
        <button class="tab" type="button" data-tab="prompts" role="tab">Prompts</button>
        <button class="tab" type="button" data-tab="ui" role="tab">UI</button>
      </div>

      <div class="tab-panel active" data-tab-panel="model">
        <fieldset class="provider-group">
          <legend>Provider</legend>
          <label class="radio-row">
            <input type="radio" name="provider" id="provider-local" value="local" />
            <span>Local LLM (LM Studio / OpenAI-compatible)</span>
          </label>
          <label class="radio-row">
            <input type="radio" name="provider" id="provider-openai" value="openai" />
            <span>OpenAI Cloud</span>
          </label>
          <label class="radio-row">
            <input type="radio" name="provider" id="provider-openrouter" value="openrouter" />
            <span>OpenRouter (300+ models, thinking off)</span>
          </label>
        </fieldset>

        <fieldset id="local-settings" class="form-group">
          <legend>Local LLM</legend>
          <label>
            Base URL
            <div class="row">
              <input id="baseUrl" type="text" placeholder="http://127.0.0.1:1234/v1" />
              <button id="test-base-url" class="ghost" type="button">Test</button>
            </div>
            <span id="base-url-result" class="meta"></span>
          </label>
          <label>
            Model
            <div class="row">
              <select id="model-local"></select>
              <button id="reload-models" class="ghost" type="button">↻</button>
            </div>
          </label>
          <label>
            Temperature
            <input id="temperature" type="number" min="0" max="2" step="0.1" />
          </label>
          <button id="save-local" class="primary" type="button">Save local settings</button>
        </fieldset>

        <fieldset id="openai-settings" class="form-group hidden">
          <legend>OpenAI Cloud</legend>
          <label>
            API key
            <div class="row">
              <input id="openaiApiKey" type="password" placeholder="sk-…" autocomplete="off" />
              <button id="test-openai" class="ghost" type="button">Test</button>
            </div>
            <span id="openai-result" class="meta"></span>
          </label>
          <label>
            Model
            <div class="row">
              <select id="model-openai"></select>
              <button id="reload-openai-models" class="ghost" type="button">↻</button>
            </div>
          </label>
          <button id="save-openai" class="primary" type="button">Save OpenAI settings</button>
        </fieldset>

        <fieldset id="openrouter-settings" class="form-group hidden">
          <legend>OpenRouter</legend>
          <label>
            API key
            <div class="row">
              <input id="openrouterApiKey" type="password" placeholder="sk-or-…" autocomplete="off" />
              <button id="test-openrouter" class="ghost" type="button">Test</button>
            </div>
            <span id="openrouter-result" class="meta"></span>
          </label>
          <label>
            Filter
            <input id="openrouter-filter" type="text" placeholder="claude, gpt, gemini, free…" autocomplete="off" />
          </label>
          <label>
            Model
            <div class="row">
              <select id="model-openrouter"></select>
              <button id="reload-openrouter-models" class="ghost" type="button">↻</button>
            </div>
            <span id="openrouter-model-count" class="meta"></span>
          </label>
          <button id="save-openrouter" class="primary" type="button">Save OpenRouter settings</button>
        </fieldset>
      </div>

      <div class="tab-panel" data-tab-panel="prompts">
        <fieldset class="form-group">
          <legend>Prompts</legend>
          <label>
            Summarize it
            <textarea id="summaryPrompt" rows="4"></textarea>
          </label>
          <label>
            Summary with examples
            <textarea id="summaryExamplesPrompt" rows="6"></textarea>
          </label>
          <div class="row">
            <button id="reset-prompts" class="ghost" type="button">Reset to defaults</button>
            <button id="save-prompts" class="primary" type="button">Save prompts</button>
          </div>
        </fieldset>
      </div>

      <div class="tab-panel" data-tab-panel="ui">
        <fieldset class="form-group">
          <legend>UI</legend>
          <label>
            UI font size (px)
            <input id="uiFontSize" type="number" min="10" max="28" step="1" />
          </label>
          <label>
            Chat font size (px)
            <input id="chatFontSize" type="number" min="10" max="32" step="1" />
          </label>
          <label class="check-row">
            <input id="transparentAssistant" type="checkbox" />
            <span>Transparent background for assistant messages</span>
          </label>
          <button id="save-ui" class="primary" type="button">Save UI settings</button>
        </fieldset>
      </div>
    </section>

    <section class="chat" id="chat">
      <div id="messages" class="messages"></div>
      <form id="ask-form" class="composer">
        <textarea
          id="ask-input"
          rows="1"
          placeholder="Type something…"
        ></textarea>
        <button id="ask-btn" class="send-btn" type="submit" title="Send">Send</button>
        <button id="stop-btn" class="stop-btn hidden" type="button" title="Остановить">■</button>
      </form>
      <div class="chip-bar">
        <button id="strict-mode" class="chip active" type="button" title="Отвечать только в рамках транскрипта лекции" aria-pressed="true">
          <span class="chip-radio"></span>
          <span>Use lecture context only</span>
        </button>
      </div>
    </section>

    <script src="vendor/highlight.min.js"></script>
    <script src="vendor/marked.min.js"></script>
    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
