<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Udemy Lecture AI</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header class="topbar">
      <span class="dot" id="status-dot"></span>
      <div class="actions">
        <button id="load-transcript" class="icon-btn text-btn" title="Reload transcript">Reload transcript</button>
        <button id="summarize" class="icon-btn text-btn" title="Summarize" disabled>Summary</button>
        <button id="strict-mode" class="icon-btn text-btn active" title="Отвечать только в рамках транскрипта лекции" aria-pressed="true">Lecture context only</button>
        <button id="settings-toggle" class="icon-btn" title="Settings">⚙</button>
      </div>
    </header>

    <section id="settings-panel" class="settings hidden">
      <label>
        Base URL
        <input id="baseUrl" type="text" placeholder="http://127.0.0.1:1234/v1" />
      </label>
      <label>
        Model
        <div class="row">
          <select id="model"></select>
          <button id="reload-models" class="ghost">↻</button>
        </div>
      </label>
      <label>
        Temperature
        <input id="temperature" type="number" min="0" max="2" step="0.1" />
      </label>
      <button id="save-settings" class="primary">Save</button>
    </section>

    <section class="chat" id="chat">
      <div id="messages" class="messages"></div>
      <form id="ask-form" class="composer">
        <input
          id="ask-input"
          type="text"
          placeholder="Вопрос…"
        />
        <button id="ask-btn" class="send-btn" type="submit" title="Send">Send</button>
      </form>
    </section>

    <script src="markdown.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
